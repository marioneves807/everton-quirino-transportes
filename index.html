<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everton Quirino Transportes</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#14191F;
            color:white;
        }

        header{
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#E8541E;
        }

        .hero{
            min-height:80vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        .hero h1{
            font-size:52px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            max-width:700px;
            margin:auto;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            background:#E8541E;
            color:white;
            text-decoration:none;
            padding:15px 30px;
            border-radius:8px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        Everton Quirino Transportes
    </div>
</header>

<section class="hero">
    <div>
        <h1>
            Transporte Nacional e Internacional
        </h1>

        <p>
            Soluções de transporte de mercadorias para Portugal e Europa.
        </p>

        <a href="#" class="btn">
            Pedir Orçamento
        </a>
    </div>
</section>

</body>
</html>
